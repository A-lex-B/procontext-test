openapi: 3.0.3
info:
  title: 'Документация API сервиса коротких ссылок'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
tags:
  -
    name: Endpoints
    description: ''
paths:
  /api/links:
    post:
      summary: 'Создание короткой ссылки'
      operationId: ''
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  description: 'Must be a valid URL.'
                  example: 'http://kunze.biz/iste-laborum-eius-est-dolor.html'
              required:
                - url
      security: []
  '/{code}':
    get:
      summary: 'Перенаправление по короткой ссылке'
      operationId: ''
      description: ''
      parameters: []
      responses:
        302:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "<!DOCTYPE html>\n<html>\n    <head>\n        <meta charset=\"UTF-8\" />\n        <meta http-equiv=\"refresh\" content=\"0;url='http://sgghdfh/dddddddd/tttttttt/aaaaaaaaaaaa'\" />\n\n        <title>Redirecting to http://sgghdfh/dddddddd/tttttttt/aaaaaaaaaaaa</title>\n    </head>\n    <body>\n        Redirecting to <a href=\"http://sgghdfh/dddddddd/tttttttt/aaaaaaaaaaaa\">http://sgghdfh/dddddddd/tttttttt/aaaaaaaaaaaa</a>.\n    </body>\n</html>"
      tags:
        - Endpoints
      security: []
    parameters:
      -
        in: path
        name: code
        description: ''
        example: 4nnajb
        required: true
        schema:
          type: string
  '/api/links/{code}/stats':
    get:
      summary: 'Получение статистики по короткой ссылке'
      operationId: ''
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 4nnajb
                  url: 'http://sgghdfh/dddddddd/tttttttt/aaaaaaaaaaaa'
                  clicks: 1
                  created_at: '2026-06-06T11:31:49.000000Z'
                properties:
                  code:
                    type: string
                    example: 4nnajb
                  url:
                    type: string
                    example: 'http://sgghdfh/dddddddd/tttttttt/aaaaaaaaaaaa'
                  clicks:
                    type: integer
                    example: 1
                  created_at:
                    type: string
                    example: '2026-06-06T11:31:49.000000Z'
      tags:
        - Endpoints
      security: []
    parameters:
      -
        in: path
        name: code
        description: ''
        example: 4nnajb
        required: true
        schema:
          type: string
